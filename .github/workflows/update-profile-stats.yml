name: Update profile counters

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-profile-stats.yml
      - scripts/update_profile_stats.py
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-profile-counters
  cancel-in-progress: true

jobs:
  update-counters:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v7

      - name: Refresh counters
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update_profile_stats.py

      - name: Commit changed counters
        shell: bash
        run: |
          if git diff --quiet -- README.md; then
            echo "Counters are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update profile counters"
          git push
